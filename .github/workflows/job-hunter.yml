name: Job Hunter

# Executa o Job Hunter de segunda a sexta às 8h (horário de Brasília = 11h UTC)
# Para rodar manualmente: Actions → Job Hunter → Run workflow
on:
  schedule:
    - cron: '0 11 * * 1-5'  # seg-sex 11h UTC = 8h BRT
  workflow_dispatch:          # permite execução manual

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      # Faz checkout do código
      - uses: actions/checkout@v4

      # Configura Node.js 20
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Instala dependências do projeto
      - run: npm ci

      # Restaura o cache de IDs já vistos para evitar reenvio de vagas duplicadas
      - name: Restaurar cache de dedup
        uses: actions/cache@v4
        with:
          path: data/seen-jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      # Executa o Job Hunter
      - name: Executar Job Hunter
        run: node src/job-hunter/index.js
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JOB_EMAIL_FROM: ${{ secrets.JOB_EMAIL_FROM }}
          JOB_EMAIL_TO: ${{ secrets.JOB_EMAIL_TO }}

      # Salva o cache atualizado mesmo se o passo anterior falhar
      - name: Salvar cache de dedup
        if: always()
        uses: actions/cache@v4
        with:
          path: data/seen-jobs.json
          key: seen-jobs-${{ github.run_id }}
