name: Job Hunter

# Executa de segunda a sexta às 8h (horário de Brasília = 11h UTC)
# Para rodar manualmente: Actions → Job Hunter → Run workflow
on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      linkedin_date_posted:
        description: 'Date posted filter'
        required: false
        default: 'r86400'
        type: choice
        options:
          - r86400    # Last 24 hours
          - r604800   # Last week
          - r2592000  # Last month

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Restaurar cache de dedup
        uses: actions/cache@v4
        with:
          path: data/seen-jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Executar Job Hunter
        run: node src/job-hunter/index.js
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODELS_ANALYZER: ${{ secrets.OPENROUTER_MODELS_ANALYZER }}
          OPENROUTER_MODELS_WRITER: ${{ secrets.OPENROUTER_MODELS_WRITER }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JOB_EMAIL_FROM: ${{ secrets.JOB_EMAIL_FROM }}
          JOB_EMAIL_TO: ${{ secrets.JOB_EMAIL_TO }}
          LINKEDIN_DATE_POSTED: ${{ inputs.linkedin_date_posted || 'r86400' }}

      - name: Salvar cache de dedup
        if: always()
        uses: actions/cache@v4
        with:
          path: data/seen-jobs.json
          key: seen-jobs-${{ github.run_id }}
